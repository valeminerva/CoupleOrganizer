<!DOCTYPE html>
<html>
<head>
  <title>Our Home Hub</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    li {
      margin: 6px 0;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<h1>Our Home Hub</h1>

<div class="card">
  <h2>Activities</h2>
  <input id="activityInput">
  <button onclick="addItem('activities','activityInput')">Add</button>
  <ul id="activities"></ul>
</div>

<div class="card">
  <h2>Groceries</h2>
  <input id="groceryInput">
  <button onclick="addItem('groceries','groceryInput')">Add</button>
  <ul id="groceries"></ul>
</div>

<div class="card">
  <h2>Chores</h2>
  <input id="choreInput">
  <button onclick="addItem('chores','choreInput')">Add</button>
  <ul id="chores"></ul>
</div>

<script>
function getData(type) {
  return JSON.parse(localStorage.getItem(type)) || [];
}

function saveData(type, data) {
  localStorage.setItem(type, JSON.stringify(data));
}

function addItem(type, inputId) {
  const input = document.getElementById(inputId);
  if (!input.value.trim()) return;

  const data = getData(type);
  data.push({ text: input.value, done: false });

  saveData(type, data);
  input.value = "";
  render();
}

function toggle(type, index) {
  const data = getData(type);
  data[index].done = !data[index].done;

  saveData(type, data);
  render();
}

function renderList(type) {
  const list = document.getElementById(type);
  list.innerHTML = "";

  const data = getData(type);

  data.forEach((item, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} 
        onclick="toggle('${type}', ${index})">
      <span class="${item.done ? "done" : ""}">
        ${item.text}
      </span>
    `;

    list.appendChild(li);
  });
}

function render() {
  renderList("activities");
  renderList("groceries");
  renderList("chores");
}

render();
</script>

</body>
</html>
