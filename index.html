<!DOCTYPE html>
<html>
<head>
  <title>Our Home Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 28px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    li {
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Our Home Hub</h1>

<div class="card">
  <h2>Activities</h2>
  <input id="activityInput" placeholder="Add activity">
  <button onclick="addActivity()">Add</button>
  <ul id="activityList"></ul>
</div>

<div class="card">
  <h2>Grocery List</h2>
  <input id="groceryInput" placeholder="Add item">
  <button onclick="addGrocery()">Add</button>
  <ul id="groceryList"></ul>
</div>

<div class="card">
  <h2>Chores</h2>
  <input id="choreInput" placeholder="Add chore">
  <button onclick="addChore()">Add</button>
  <ul id="choreList"></ul>
</div>

<script>
// Load saved data
let activities = JSON.parse(localStorage.getItem("activities")) || [];
let groceries = JSON.parse(localStorage.getItem("groceries")) || [];
let chores = JSON.parse(localStorage.getItem("chores")) || [];

// Save function
function saveData() {
  localStorage.setItem("activities", JSON.stringify(activities));
  localStorage.setItem("groceries", JSON.stringify(groceries));
  localStorage.setItem("chores", JSON.stringify(chores));
}

// Render lists
function render() {
  const activityList = document.getElementById("activityList");
  const groceryList = document.getElementById("groceryList");
  const choreList = document.getElementById("choreList");

  activityList.innerHTML = "";
  groceryList.innerHTML = "";
  choreList.innerHTML = "";

  activities.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerHTML = `${item} <span class="delete" onclick="deleteItem('activities', ${index})">✖</span>`;
    activityList.appendChild(li);
  });

  groceries.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerHTML = `${item} <span class="delete" onclick="deleteItem('groceries', ${index})">✖</span>`;
    groceryList.appendChild(li);
  });

  chores.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerHTML = `${item} <span class="delete" onclick="deleteItem('chores', ${index})">✖</span>`;
    choreList.appendChild(li);
  });
}

// Add functions
function addActivity() {
  const input = document.getElementById("activityInput");
  if (!input.value.trim()) return;

  activities.push(input.value);
  input.value = "";
  saveData();
  render();
}

function addGrocery() {
  const input = document.getElementById("groceryInput");
  if (!input.value.trim()) return;

  groceries.push(input.value);
  input.value = "";
  saveData();
  render();
}

function addChore() {
  const input = document.getElementById("choreInput");
  if (!input.value.trim()) return;

  chores.push(input.value);
  input.value = "";
  saveData();
  render();
}

// Delete function
function deleteItem(type, index) {
  if (type === "activities") activities.splice(index, 1);
  if (type === "groceries") groceries.splice(index, 1);
  if (type === "chores") chores.splice(index, 1);

  saveData();
  render();
}

// Initial render
render();
</script>

</body>
</html>
