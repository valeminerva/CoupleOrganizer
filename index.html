<!DOCTYPE html>
<html>
<head>
  <title>Gergő &amp; Valika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #5727F5;
    }

    .container {
      max-width: 750px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      color: #5727F5;
    }

    .card {
      background: white;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, select, button {
      min-height: 44px;
      font-size: 16px;
      border-radius: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .add-btn {
      background: #c4b5fd;
      color: white;
      border: none;
      font-size: 24px;
      font-weight: bold;
      width: 48px;
      height: 48px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      background: #f9fafb;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
    }

    .item-text {
      min-width: 0;
      word-break: break-word;
    }

    .item-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: #fca5a5;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

    .calendar {
      background: #86efac;
      color: #065f46;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

    .date-info {
      font-size: 13px;
      color: #6b7280;
      margin-top: 3px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 12px;
      }

      h1 {
        font-size: 28px;
      }

      .card {
        padding: 14px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .add-btn {
        width: 100%;
      }

      .item-actions {
        grid-template-columns: 1fr 1fr;
      }

      .item-actions select {
        grid-column: 1 / -1;
      }

      .calendar,
      .delete {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gergő &amp; Valika</h1>

    <div class="card">
      <h2>📅 Activities</h2>
      <div class="input-row">
        <input class="wide" type="text" id="activityInput" placeholder="Add activity">
        <input type="date" id="activityDate">
        <input type="time" id="activityTime">
        <select id="activityUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button class="add-btn" onclick="addActivity()">+</button>
      </div>
      <ul id="activities"></ul>
    </div>

    <div class="card">
      <h2>🛒 Groceries</h2>
      <div class="input-row">
        <input type="text" id="groceryInput" placeholder="Add item">
        <select id="groceryUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button class="add-btn" onclick="addItem('groceries','groceryInput','groceryUser')">+</button>
      </div>
      <ul id="groceries"></ul>
    </div>

    <div class="card">
      <h2>🏠 Chores</h2>
      <div class="input-row">
        <input type="text" id="choreInput" placeholder="Add chore">
        <select id="choreUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button class="add-btn" onclick="addItem('chores','choreInput','choreUser')">+</button>
      </div>
      <ul id="chores"></ul>
    </div>
  </div>

<script>
function getData(type) {
  return JSON.parse(localStorage.getItem(type)) || [];
}

function saveData(type, data) {
  localStorage.setItem(type, JSON.stringify(data));
}

function addActivity() {
  const input = document.getElementById("activityInput");
  const date = document.getElementById("activityDate");
  const time = document.getElementById("activityTime");
  const user = document.getElementById("activityUser").value;

  if (!input.value.trim()) return;

  const data = getData("activities");
  data.push({
    text: input.value.trim(),
    date: date.value,
    time: time.value,
    done: false,
    user: user
  });

  saveData("activities", data);
  input.value = "";
  date.value = "";
  time.value = "";
  render();
}

function addItem(type, inputId, userId) {
  const input = document.getElementById(inputId);
  const user = document.getElementById(userId).value;

  if (!input.value.trim()) return;

  const data = getData(type);
  data.push({
    text: input.value.trim(),
    done: false,
    user: user
  });

  saveData(type, data);
  input.value = "";
  render();
}

function toggle(type, index) {
  const data = getData(type);
  data[index].done = !data[index].done;
  saveData(type, data);
  render();
}

function changeAssignment(type, index, newUser) {
  const data = getData(type);
  data[index].user = newUser;
  saveData(type, data);
  render();
}

function deleteItem(type, index) {
  const data = getData(type);
  data.splice(index, 1);
  saveData(type, data);
  render();
}

function formatGoogleDate(date, time) {
  const startTime = time || "09:00";
  const [hour, minute] = startTime.split(":");
  const endHour = String(Number(hour) + 1).padStart(2, "0");
  const cleanDate = date.replaceAll("-", "");

  return cleanDate + "T" + hour + minute + "00/" + cleanDate + "T" + endHour + minute + "00";
}

function openGoogleCalendar(index) {
  const data = getData("activities");
  const item = data[index];

  if (!item || !item.date) {
    alert("Please add a date first.");
    return;
  }

  const url =
    "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + encodeURIComponent(item.text) +
    "&details=" + encodeURIComponent("Assigned to: " + (item.user || "Both")) +
    "&dates=" + formatGoogleDate(item.date, item.time);

  window.open(url, "_blank");
}

function renderActivities() {
  const list = document.getElementById("activities");
  list.innerHTML = "";

  const data = getData("activities");

  data.forEach((item, index) => {
    const currentUser = item.user || "Both";
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('activities', ${index})">

      <div class="item-text ${item.done ? "done" : ""}">
        ${item.text}
        <div class="date-info">${item.date || "No date"} ${item.time || ""}</div>
      </div>

      <div class="item-actions">
        <select onchange="changeAssignment('activities', ${index}, this.value)">
          <option ${currentUser === "Both" ? "selected" : ""}>Both</option>
          <option ${currentUser === "Valika" ? "selected" : ""}>Valika</option>
          <option ${currentUser === "Gergő" ? "selected" : ""}>Gergő</option>
        </select>
        <button class="calendar" onclick="openGoogleCalendar(${index})">📅</button>
        <button class="delete" onclick="deleteItem('activities', ${index})">✕</button>
      </div>
    `;

    list.appendChild(li);
  });
}

function renderList(type) {
  const list = document.getElementById(type);
  list.innerHTML = "";

  const data = getData(type);

  data.forEach((item, index) => {
    const currentUser = item.user || "Both";
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('${type}', ${index})">

      <div class="item-text ${item.done ? "done" : ""}">
        ${item.text}
      </div>

      <div class="item-actions">
        <select onchange="changeAssignment('${type}', ${index}, this.value)">
          <option ${currentUser === "Both" ? "selected" : ""}>Both</option>
          <option ${currentUser === "Valika" ? "selected" : ""}>Valika</option>
          <option ${currentUser === "Gergő" ? "selected" : ""}>Gergő</option>
        </select>
        <button class="delete" onclick="deleteItem('${type}', ${index})">✕</button>
      </div>
    `;

    list.appendChild(li);
  });
}

function render() {
  renderActivities();
  renderList("groceries");
  renderList("chores");
}

render();
</script>

</body>
</html>
