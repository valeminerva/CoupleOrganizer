<!DOCTYPE html>
<html>
<head>
  <title>Gergő &amp; Valika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #5727F5;
    }

    .container {
      max-width: 750px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      color: #5727F5; /* purple title */
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    input[type="text"] {
      flex: 1;
      min-width: 180px;
    }

    /* ADD BUTTON → LIGHT PURPLE */
    button {
      padding: 10px 14px;
      background: #a78bfa;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #8b5cf6;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      flex-wrap: wrap;
    }

    li span {
      flex: 1;
      min-width: 120px;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    /* DELETE → SOFT RED */
    .delete {
      background: #fca5a5;
      font-size: 12px;
    }

    .delete:hover {
      background: #ef4444;
    }

    /* CALENDAR → SOFT GREEN */
    .calendar {
      background: #86efac;
      font-size: 12px;
      color: #065f46;
    }

    .calendar:hover {
      background: #22c55e;
      color: white;
    }

    .assignment {
      max-width: 110px;
    }

    .date-info {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gergő &amp; Valika</h1>

    <div class="card">
      <h2>📅 Activities</h2>
      <div class="input-row">
        <input type="text" id="activityInput" placeholder="Add activity">
        <input type="date" id="activityDate">
        <input type="time" id="activityTime">
        <select id="activityUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addActivity()">+</button>
      </div>
      <ul id="activities"></ul>
    </div>

    <div class="card">
      <h2>🛒 Groceries</h2>
      <div class="input-row">
        <input type="text" id="groceryInput" placeholder="Add item">
        <select id="groceryUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addItem('groceries','groceryInput','groceryUser')">+</button>
      </div>
      <ul id="groceries"></ul>
    </div>

    <div class="card">
      <h2>🏠 Chores</h2>
      <div class="input-row">
        <input type="text" id="choreInput" placeholder="Add chore">
        <select id="choreUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addItem('chores','choreInput','choreUser')">+</button>
      </div>
      <ul id="chores"></ul>
    </div>
  </div>

<script>
function getData(type) {
  return JSON.parse(localStorage.getItem(type)) || [];
}

function saveData(type, data) {
  localStorage.setItem(type, JSON.stringify(data));
}

function addActivity() {
  const input = document.getElementById("activityInput");
  const date = document.getElementById("activityDate");
  const time = document.getElementById("activityTime");
  const user = document.getElementById("activityUser").value;

  if (!input.value.trim()) return;

  const data = getData("activities");

  data.push({
    text: input.value.trim(),
    date: date.value,
    time: time.value,
    done: false,
    user: user
  });

  saveData("activities", data);

  input.value = "";
  date.value = "";
  time.value = "";
  render();
}

function addItem(type, inputId, userId) {
  const input = document.getElementById(inputId);
  const user = document.getElementById(userId).value;

  if (!input.value.trim()) return;

  const data = getData(type);

  data.push({
    text: input.value.trim(),
    done: false,
    user: user
  });

  saveData(type, data);

  input.value = "";
  render();
}

function toggle(type, index) {
  const data = getData(type);
  data[index].done = !data[index].done;
  saveData(type, data);
  render();
}

function changeAssignment(type, index, newUser) {
  const data = getData(type);
  data[index].user = newUser;
  saveData(type, data);
  render();
}

function deleteItem(type, index) {
  const data = getData(type);
  data.splice(index, 1);
  saveData(type, data);
  render();
}

function formatGoogleDate(date, time) {
  const startTime = time || "09:00";
  const [hour, minute] = startTime.split(":");
  const endHour = String(Number(hour) + 1).padStart(2, "0");

  const cleanDate = date.replaceAll("-", "");

  const start = cleanDate + "T" + hour + minute + "00";
  const end = cleanDate + "T" + endHour + minute + "00";

  return start + "/" + end;
}

function openGoogleCalendar(index) {
  const data = getData("activities");
  const item = data[index];

  if (!item || !item.date) {
    alert("Please add a date first.");
    return;
  }

  const title = encodeURIComponent(item.text);
  const details = encodeURIComponent("Assigned to: " + (item.user || "Both"));
  const dates = formatGoogleDate(item.date, item.time);

  const url =
    "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + title +
    "&details=" + details +
    "&dates=" + dates;

  window.open(url, "_blank");
}

function renderActivities() {
  const list = document.getElementById("activities");
  list.innerHTML = "";

  const data = getData("activities");

  data.forEach((item, index) => {
    const currentUser = item.user || "Both";
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('activities', ${index})">

      <span class="${item.done ? "done" : ""}">
        ${item.text}
        <div class="date-info">${item.date || "No date"} ${item.time || ""}</div>
      </span>

      <select class="assignment" onchange="changeAssignment('activities', ${index}, this.value)">
        <option ${currentUser === "Both" ? "selected" : ""}>Both</option>
        <option ${currentUser === "Valika" ? "selected" : ""}>Valika</option>
        <option ${currentUser === "Gergő" ? "selected" : ""}>Gergő</option>
      </select>

      <button class="calendar" onclick="openGoogleCalendar(${index})">Calendar</button>
      <button class="delete" onclick="deleteItem('activities', ${index})">X</button>
    `;

    list.appendChild(li);
  });
}

function renderList(type) {
  const list = document.getElementById(type);
  list.innerHTML = "";

  const data = getData(type);

  data.forEach((item, index) => {
    const currentUser = item.user || "Both";
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('${type}', ${index})">

      <span class="${item.done ? "done" : ""}">
        ${item.text}
      </span>

      <select class="assignment" onchange="changeAssignment('${type}', ${index}, this.value)">
        <option ${currentUser === "Both" ? "selected" : ""}>Both</option>
        <option ${currentUser === "Valika" ? "selected" : ""}>Valika</option>
        <option ${currentUser === "Gergő" ? "selected" : ""}>Gergő</option>
      </select>

      <button class="delete" onclick="deleteItem('${type}', ${index})">X</button>
    `;

    list.appendChild(li);
  });
}

function render() {
  renderActivities();
  renderList("groceries");
  renderList("chores");
}

render();
</script>

</body>
</html>
