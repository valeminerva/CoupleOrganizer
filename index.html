<!DOCTYPE html>
<html>
<head>
  <title>Gergő &amp; Valika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 5px;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 25px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }

    button {
      padding: 12px 16px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #374151;
    }

    ul {
      padding-left: 0;
      list-style: none;
      margin-bottom: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
    }

    li span {
      flex: 1;
    }

    .done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete {
      background: #ef4444;
      padding: 8px 10px;
      font-size: 12px;
    }

    .delete:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gergő &amp; Valika 💛</h1>
    <p class="subtitle">Plans, groceries, and chores in one shared place.</p>

    <div class="card">
      <h2>📅 Activities</h2>
      <div class="input-row">
        <input type="text" id="activityInput" placeholder="Add activity">
        <button onclick="addItem('activities','activityInput')">Add</button>
      </div>
      <ul id="activities"></ul>
    </div>

    <div class="card">
      <h2>🛒 Groceries</h2>
      <div class="input-row">
        <input type="text" id="groceryInput" placeholder="Add grocery item">
        <button onclick="addItem('groceries','groceryInput')">Add</button>
      </div>
      <ul id="groceries"></ul>
    </div>

    <div class="card">
      <h2>🏠 Chores</h2>
      <div class="input-row">
        <input type="text" id="choreInput" placeholder="Add chore">
        <button onclick="addItem('chores','choreInput')">Add</button>
      </div>
      <ul id="chores"></ul>
    </div>
  </div>

<script>
function getData(type) {
  return JSON.parse(localStorage.getItem(type)) || [];
}

function saveData(type, data) {
  localStorage.setItem(type, JSON.stringify(data));
}

function addItem(type, inputId) {
  const input = document.getElementById(inputId);
  if (!input.value.trim()) return;

  const data = getData(type);
  data.push({ text: input.value.trim(), done: false });

  saveData(type, data);
  input.value = "";
  render();
}

function toggle(type, index) {
  const data = getData(type);
  data[index].done = !data[index].done;
  saveData(type, data);
  render();
}

function deleteItem(type, index) {
  const data = getData(type);
  data.splice(index, 1);
  saveData(type, data);
  render();
}

function renderList(type) {
  const list = document.getElementById(type);
  list.innerHTML = "";

  const data = getData(type);

  data.forEach((item, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('${type}', ${index})">
      <span class="${item.done ? "done" : ""}">${item.text}</span>
      <button class="delete" onclick="deleteItem('${type}', ${index})">Delete</button>
    `;

    list.appendChild(li);
  });
}

function render() {
  renderList("activities");
  renderList("groceries");
  renderList("chores");
}

render();
</script>

</body>
</html>
