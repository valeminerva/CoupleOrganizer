<!DOCTYPE html>
<html>
<head>
  <title>Gergő &amp; Valika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      color: #16a34a;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    input {
      flex: 1;
    }

    button {
      padding: 10px 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
    }

    li span {
      flex: 1;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: #ef4444;
      font-size: 12px;
    }

    .delete:hover {
      background: #dc2626;
    }

    .assignment {
      max-width: 110px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gergő &amp; Valika</h1>

    <div class="card">
      <h2>📅 Activities</h2>
      <div class="input-row">
        <input id="activityInput" placeholder="Add activity">
        <select id="activityUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addItem('activities','activityInput','activityUser')">Add</button>
      </div>
      <ul id="activities"></ul>
    </div>

    <div class="card">
      <h2>🛒 Groceries</h2>
      <div class="input-row">
        <input id="groceryInput" placeholder="Add item">
        <select id="groceryUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addItem('groceries','groceryInput','groceryUser')">Add</button>
      </div>
      <ul id="groceries"></ul>
    </div>

    <div class="card">
      <h2>🏠 Chores</h2>
      <div class="input-row">
        <input id="choreInput" placeholder="Add chore">
        <select id="choreUser">
          <option>Both</option>
          <option>Valika</option>
          <option>Gergő</option>
        </select>
        <button onclick="addItem('chores','choreInput','choreUser')">Add</button>
      </div>
      <ul id="chores"></ul>
    </div>
  </div>

<script>
function getData(type) {
  return JSON.parse(localStorage.getItem(type)) || [];
}

function saveData(type, data) {
  localStorage.setItem(type, JSON.stringify(data));
}

function addItem(type, inputId, userId) {
  const input = document.getElementById(inputId);
  const user = document.getElementById(userId).value;

  if (!input.value.trim()) return;

  const data = getData(type);

  data.push({
    text: input.value.trim(),
    done: false,
    user: user
  });

  saveData(type, data);
  input.value = "";
  render();
}

function toggle(type, index) {
  const data = getData(type);
  data[index].done = !data[index].done;
  saveData(type, data);
  render();
}

function changeAssignment(type, index, newUser) {
  const data = getData(type);
  data[index].user = newUser;
  saveData(type, data);
  render();
}

function deleteItem(type, index) {
  const data = getData(type);
  data.splice(index, 1);
  saveData(type, data);
  render();
}

function renderList(type) {
  const list = document.getElementById(type);
  list.innerHTML = "";

  const data = getData(type);

  data.forEach((item, index) => {
    const currentUser = item.user || "Both";

    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${item.done ? "checked" : ""} onclick="toggle('${type}', ${index})">

      <span class="${item.done ? "done" : ""}">
        ${item.text}
      </span>

      <select class="assignment" onchange="changeAssignment('${type}', ${index}, this.value)">
        <option ${currentUser === "Both" ? "selected" : ""}>Both</option>
        <option ${currentUser === "Valika" ? "selected" : ""}>Valika</option>
        <option ${currentUser === "Gergő" ? "selected" : ""}>Gergő</option>
      </select>

      <button class="delete" onclick="deleteItem('${type}', ${index})">X</button>
    `;

    list.appendChild(li);
  });
}

function render() {
  renderList("activities");
  renderList("groceries");
  renderList("chores");
}

render();
</script>

</body>
</html>
