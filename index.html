<!DOCTYPE html>
<html>
<head>
  <title>Our Home Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 { font-size: 28px; }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    li {
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .small-btn {
      font-size: 12px;
      padding: 5px 8px;
    }

    .delete {
      background: crimson;
    }
  </style>
</head>
<body>

<h1>Our Home Hub</h1>

<div class="card">
  <h2>Activities</h2>
  <input id="activityInput" placeholder="Add activity">
  <button onclick="addActivity()">Add</button>
  <ul id="activityList"></ul>
</div>

<div class="card">
  <h2>Grocery List</h2>
  <input id="groceryInput" placeholder="Add item">
  <button onclick="addGrocery()">Add</button>
  <ul id="groceryList"></ul>
</div>

<div class="card">
  <h2>Chores</h2>
  <input id="choreInput" placeholder="Add chore">
  <button onclick="addChore()">Add</button>
  <ul id="choreList"></ul>
</div>

<script>
let activities = JSON.parse(localStorage.getItem("activities")) || [];
let groceries = JSON.parse(localStorage.getItem("groceries")) || [];
let chores = JSON.parse(localStorage.getItem("chores")) || [];

function saveData() {
  localStorage.setItem("activities", JSON.stringify(activities));
  localStorage.setItem("groceries", JSON.stringify(groceries));
  localStorage.setItem("chores", JSON.stringify(chores));
}

function createItem(text, done = false) {
  return { text, done };
}

function renderList(listElementId, items, type) {
  const list = document.getElementById(listElementId);
  list.innerHTML = "";

  items.forEach((item, index) => {
    if (typeof item === "string") {
      item = createItem(item, false);
      items[index] = item;
    }

    const li = document.createElement("li");

    li.innerHTML = `
      <span class="${item.done ? "done" : ""}">${item.text}</span>
      <span class="actions">
        <button class="small-btn" onclick="toggleDone('${type}', ${index})">
          ${item.done ? "Undo" : "Done"}
        </button>
        <button class="small-btn delete" onclick="deleteItem('${type}', ${index})">
          Delete
        </button>
      </span>
    `;

    list.appendChild(li);
  });

  saveData();
}

function render() {
  renderList("activityList", activities, "activities");
  renderList("groceryList", groceries, "groceries");
  renderList("choreList", chores, "chores");
}

function addActivity() {
  const input = document.getElementById("activityInput");
  if (!input.value.trim()) return;

  activities.push(createItem(input.value.trim()));
  input.value = "";
  saveData();
  render();
}

function addGrocery() {
  const input = document.getElementById("groceryInput");
  if (!input.value.trim()) return;

  groceries.push(createItem(input.value.trim()));
  input.value = "";
  saveData();
  render();
}

function addChore() {
  const input = document.getElementById("choreInput");
  if (!input.value.trim()) return;

  chores.push(createItem(input.value.trim()));
  input.value = "";
  saveData();
  render();
}

function toggleDone(type, index) {
  if (type === "activities") activities[index].done = !activities[index].done;
  if (type === "groceries") groceries[index].done = !groceries[index].done;
  if (type === "chores") chores[index].done = !chores[index].done;

  saveData();
  render();
}

function deleteItem(type, index) {
  if (type === "activities") activities.splice(index, 1);
  if (type === "groceries") groceries.splice(index, 1);
  if (type === "chores") chores.splice(index, 1);

  saveData();
  render();
}

render();
</script>

</body>
</html>
